
name: Python application

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: "esthefannysf"
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: esthefannysf/users-ci:${{ github.sha }}
        
    - name: executing remote ssh commands using password
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST_TEST }}
        username: "deploy"
        key: ${{ secrets.KEY_TEST }}
        port: 22
        script: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u esthefannysf --password-stdin
          docker pull esthefannysf/users-ci:${{ github.sha }}

          docker rm -f app-users || true
          docker rm -f postgres-users || true

          docker network create app-network || true

          docker run -d \
            --name postgres-users \
            --network app-network \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            postgres:15

          docker run -d \
            --name app-users \
            --network app-network \
            -p 80:5000 \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_HOST=postgres-users \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            esthefannysf/users-ci:${{ github.sha }}
